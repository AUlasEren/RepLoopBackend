services:
  auth-db:
    image: postgres:16-alpine
    container_name: reploop-auth-db
    environment:
      POSTGRES_DB: AuthDB
      POSTGRES_USER: reploop
      POSTGRES_PASSWORD: reploop123
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  workout-db:
    image: postgres:16-alpine
    container_name: reploop-workout-db
    environment:
      POSTGRES_DB: WorkoutDB
      POSTGRES_USER: reploop
      POSTGRES_PASSWORD: reploop123
    ports:
      - "5433:5432"
    volumes:
      - workout_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  exercise-db:
    image: postgres:16-alpine
    container_name: reploop-exercise-db
    environment:
      POSTGRES_DB: ExerciseDB
      POSTGRES_USER: reploop
      POSTGRES_PASSWORD: reploop123
    ports:
      - "5434:5432"
    volumes:
      - exercise_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: reploop-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: reploop
      RABBITMQ_DEFAULT_PASS: reploop123
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    container_name: reploop-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI (gelen emailler)
    restart: unless-stopped

volumes:
  auth_postgres_data:
  workout_postgres_data:
  exercise_postgres_data:
  rabbitmq_data:
