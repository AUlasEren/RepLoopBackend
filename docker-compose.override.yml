    restart: unless-stopped

  recommender-service:
    build:
      context: services/reploop-recommender
    container_name: reploop-recommender-service
    environment:
      WORKOUT_DB_HOST: workout-db
      WORKOUT_DB_PORT: "5432"
      WORKOUT_DB_NAME: WorkoutDB
      EXERCISE_DB_HOST: exercise-db
      EXERCISE_DB_PORT: "5432"
      EXERCISE_DB_NAME: ExerciseDB
      SESSION_DB_HOST: session-db
      SESSION_DB_PORT: "5432"
      SESSION_DB_NAME: SessionDB
      DB_USER: reploop
      DB_PASSWORD: reploop123
      USE_MOCK_DB: "false"
    depends_on:
      - workout-db
      - exercise-db
      - session-db
    restart: unless-stopped

  mail-sender:
    build:
      context: services
      dockerfile: MailSenderService/Dockerfile
    container_name: reploop-mail-sender
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: reploop
      RabbitMQ__Password: reploop123
      Smtp__Host: mailhog
      Smtp__Port: "1025"
      Smtp__From: noreply@reploop.app
      Smtp__Username: ""
      Smtp__Password: ""
    depends_on:
      - rabbitmq
      - mailhog
    restart: unless-stopped
